<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tabla de Cálculos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Resultados de Operaciones</h2>

<table>
    <tr>
        <th>Operación</th>
        <th>Resultado</th>
    </tr>
    <tr>
        <td>5 + 3</td>
        <td id="suma"></td>
    </tr>
    <tr>
        <td>8 - 6</td>
        <td id="resta"></td>
    </tr>
    <tr>
        <td>3 * 11</td>
        <td id="multi"></td>
    </tr>
    <tr>
        <td>30 / 5</td>
        <td id="div"></td>
    </tr>
</table>

<script src="ejercicio5.js"></script>

</body>
</html>
